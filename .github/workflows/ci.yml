name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Valeurs factices : le build ne contacte aucun service, les clés ne
      # sont lues qu'à l'exécution. Les vraies clés vivent dans Vercel.
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Aligné sur l'environnement qui génère package-lock.json (npm 11) :
          # npm ci est strict, un lockfile écrit par un autre npm peut être rejeté.
          node-version: 24
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Types
        run: npm run typecheck

      - name: Tests unitaires
        run: npm test

      - name: Build de production
        run: npm run build
